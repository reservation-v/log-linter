name: CI

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go from go.mod
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Show Go version
        run: go version

      - name: Run tests
        run: go test ./...

      - name: Build binary
        run: make build

  golangci-plugin-smoke:
    name: Build Custom golangci-lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Build custom golangci-lint
        run: make build-custom-gcl
